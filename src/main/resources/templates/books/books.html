<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{catalog.page.title}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px;">
    <div style="display: flex; gap: 10px;">
        <a th:href="@{/ui/books(lang='en', keyword=${keyword}, sort=${currentSort})}" class="page-link" style="padding: 8px 15px;">EN</a>
        <a th:href="@{/ui/books(lang='uk', keyword=${keyword}, sort=${currentSort})}" class="page-link" style="padding: 8px 15px;">UA</a>
    </div>
    <a href="http://localhost:5173" class="btn-search" style="text-decoration: none;" th:text="#{catalog.vue.link}"></a>
</div>

<h1 th:text="'📚 ' + #{catalog.header}"></h1>

<div class="filters">
    <form th:action="@{/ui/books}" method="get" class="search-form">
        <input type="hidden" name="lang" th:if="${param.lang != null}" th:value="${param.lang}">

        <input type="text"
               name="keyword"
               th:value="${keyword}"
               th:placeholder="#{catalog.search.placeholder}"
               class="input-search">

        <select name="sort" class="select-sort" onchange="this.form.submit()">
            <option value="name,asc" th:selected="${currentSort == 'name,asc'}" th:text="#{catalog.sort.name.asc}"></option>
            <option value="name,desc" th:selected="${currentSort == 'name,desc'}" th:text="#{catalog.sort.name.desc}"></option>
            <option value="price,asc" th:selected="${currentSort == 'price,asc'}" th:text="#{catalog.sort.price.asc}"></option>
            <option value="price,desc" th:selected="${currentSort == 'price,desc'}" th:text="#{catalog.sort.price.desc}"></option>
        </select>

        <button type="submit" class="btn-search" th:text="#{catalog.btn.search}"></button>
        <a th:href="@{/ui/books(lang=${param.lang})}" class="btn-reset" th:text="#{catalog.btn.reset}"></a>
    </form>
</div>

<div class="grid">
    <div th:each="book : ${books}" class="card">
        <div class="title" th:text="${book.name}"></div>
        <div class="author" th:text="#{catalog.book.by} + ' ' + ${book.author}"></div>

        <div class="card-actions">
            <a th:href="@{/api/books/{id}(id=${book.id})}" class="btn-details" th:text="#{catalog.btn.details}"></a>
        </div>

        <div class="card-footer">
            <div class="price" th:text="${book.price} + ' $'"></div>
            <a th:href="@{'http://localhost:5173/books/' + ${book.id}}" class="btn-buy" th:text="#{catalog.btn.buy}"></a>
        </div>
    </div>
</div>

<div class="pagination" th:if="${totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="@{/ui/books(page=${currentPage - 1}, keyword=${keyword}, sort=${currentSort}, lang=${param.lang})}"
       class="page-link" th:utext="'&laquo; ' + #{catalog.pagination.prev}"></a>

    <div class="page-info">
        <span th:text="#{catalog.pagination.page}"></span> <span th:text="${currentPage + 1}"></span> <span th:text="#{catalog.pagination.of}"></span> <span th:text="${totalPages}"></span>
    </div>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/ui/books(page=${currentPage + 1}, keyword=${keyword}, sort=${currentSort}, lang=${param.lang})}"
       class="page-link" th:utext="#{catalog.pagination.next} + ' &raquo;'"></a>
</div>

</body>
</html>
